<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel – AMK Valuation Portal</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-hero { background: linear-gradient(135deg, var(--navy) 0%, #1a3a5c 100%); padding: 2rem 2.5rem; margin-bottom: 2rem; border-radius: var(--radius-lg); display: flex; justify-content: space-between; align-items: center; }
        .admin-hero h1 { font-family: var(--font-display); color: var(--gold); font-size: 2rem; margin-bottom: 4px; }
        .admin-hero p { color: var(--gray-400); font-size: 0.9rem; }
        .table-container { background: var(--white); border-radius: var(--radius-lg); border: 1px solid var(--gray-200); overflow: hidden; }
        .table-toolbar { padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--gray-200); gap: 1rem; flex-wrap: wrap; }
        .search-box { display: flex; align-items: center; gap: 8px; background: var(--gray-100); border-radius: var(--radius-sm); padding: 0.45rem 1rem; border: 1.5px solid transparent; transition: all var(--transition); min-width: 240px; }
        .search-box:focus-within { background: var(--white); border-color: var(--gold); }
        .search-box input { border: none; background: transparent; outline: none; font-family: var(--font-body); font-size: 0.875rem; color: var(--navy); width: 100%; }
        .search-box input::placeholder { color: var(--gray-400); }
        .admin-table { overflow-x: auto; }
        .empty-table { text-align: center; padding: 3rem; color: var(--gray-400); }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="navbar-brand">AMK <span>Admin Panel</span></div>
    <div class="navbar-right">
        <div class="navbar-user">
            <div class="user-avatar-sm" id="avatar-initial">A</div>
            <span id="admin-name">Loading...</span>
        </div>
        <a href="dashboard.html" class="btn btn-outline btn-sm">Dashboard</a>
        <button class="btn btn-outline btn-sm" onclick="Auth.logout()">Sign Out</button>
    </div>
</nav>

<div class="page-container">

    <div class="admin-hero">
        <div>
            <h1>Admin Dashboard</h1>
            <p>Manage all submitted valuation reports</p>
        </div>
        <button class="btn btn-primary" onclick="Admin.loadAllSubmissions(); Admin.loadStats()">Refresh</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">Total Reports</div><div class="stat-value" id="stat-total">--</div></div>
        <div class="stat-card"><div class="stat-label">Submitted</div><div class="stat-value" id="stat-submitted" style="color:var(--info)">--</div></div>
        <div class="stat-card"><div class="stat-label">Reviewed</div><div class="stat-value" id="stat-reviewed" style="color:var(--success)">--</div></div>
        <div class="stat-card"><div class="stat-label">Drafts</div><div class="stat-value" id="stat-draft" style="color:var(--gold)">--</div></div>
    </div>

    <div class="table-container">
        <div class="table-toolbar">
            <div class="filter-tabs" style="margin-bottom:0;">
                <button class="filter-tab active" onclick="Admin.filter('all', this)">All</button>
                <button class="filter-tab" onclick="Admin.filter('submitted', this)">Submitted</button>
                <button class="filter-tab" onclick="Admin.filter('reviewed', this)">Reviewed</button>
                <button class="filter-tab" onclick="Admin.filter('draft', this)">Drafts</button>
            </div>
            <div class="search-box">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="search-input" placeholder="Search by letter ref, account name, email..." oninput="Admin.search(this.value)">
            </div>
        </div>
        <div class="admin-table" id="admin-submissions-list">
            <div class="loading-spinner"></div>
        </div>
    </div>

</div>

<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<!-- Shared modules — to change PDF edit pdf-template.js, to change auth edit auth.js -->
<script src="config.js"></script>
<script src="auth.js"></script>
<script src="ui.js"></script>
<script src="core/db.js"></script>
<script src="core/pdf-engine.js"></script>
<script src="forms/vehicle-valuation/pdf-template.js"></script>
<script src="forms/property-valuation/pdf-template.js"></script>
<script src="forms/ebl-land-building/pdf-template.js"></script>

<script>
// ═══════════════════════════════════════════════════════════
//  admin.html  —  page-specific logic only
//  To change PDF layout  → forms/vehicle-valuation/pdf-template.js
//  To change auth        → auth.js
//  To change DB queries  → core/db.js
// ═══════════════════════════════════════════════════════════
const Admin = {
    allData: [],
    currentFilter: 'all',

    async init() {
        const auth = await Auth.requireAdmin();
        if (!auth) return;
        const { profile } = auth;
        document.getElementById('admin-name').textContent = profile.full_name || profile.email;
        document.getElementById('avatar-initial').textContent = (profile.full_name || profile.email)[0].toUpperCase();
        await this.loadStats();
        await this.loadAllSubmissions();
    },

    async loadStats() {
        try {
            const { data } = await db.from('submissions').select('status');
            const counts = { total: data.length, draft: 0, submitted: 0, reviewed: 0 };
            data.forEach(s => { if (counts[s.status] !== undefined) counts[s.status]++; });
            document.getElementById('stat-total').textContent     = counts.total;
            document.getElementById('stat-submitted').textContent = counts.submitted;
            document.getElementById('stat-reviewed').textContent  = counts.reviewed;
            document.getElementById('stat-draft').textContent     = counts.draft;
        } catch(err) { console.error(err); }
    },

    async loadAllSubmissions() {
        const container = document.getElementById('admin-submissions-list');
        container.innerHTML = '<div class="loading-spinner"></div>';
        try {
            // 1. Fetch submissions
            let query = db.from('submissions').select('*').order('updated_at', { ascending: false });
            if (this.currentFilter !== 'all') query = query.eq('status', this.currentFilter);
            const { data, error } = await query;
            if (error) throw error;

            // 2. Fetch profiles for all unique user_ids
            const userIds = [...new Set(data.map(s => s.user_id).filter(Boolean))];
            let profileMap = {};
            if (userIds.length > 0) {
                const { data: profiles } = await db.from('profiles').select('*').in('id', userIds);
                if (profiles) profiles.forEach(p => { profileMap[p.id] = p; });
            }

            // 3. Attach profile to each submission
            const enriched = data.map(s => ({ ...s, _profile: profileMap[s.user_id] || null }));
            this.allData = enriched;
            this.render(enriched);
        } catch(err) {
            container.innerHTML = `<div class="error-msg" style="margin:1rem;">Error: ${err.message}</div>`;
        }
    },

    filter(f, btn) {
        this.currentFilter = f;
        document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('search-input').value = '';
        this.loadAllSubmissions();
    },

    search(query) {
        const q = query.toLowerCase();
        const filtered = this.allData.filter(sub => {
            const fd = sub.form_data || {};
            const searchStr = [
                fd.letter_ref,
                fd.reference_account_name,
                fd.file_reference_number,
                sub._profile?.email,
                sub._profile?.full_name
            ].join(' ').toLowerCase();
            return searchStr.includes(q);
        });
        this.render(filtered);
    },

    render(list) {
        const container = document.getElementById('admin-submissions-list');
        if (list.length === 0) {
            container.innerHTML = '<div class="empty-table"><p>No submissions found.</p></div>';
            return;
        }
        container.innerHTML = `
            <table class="admin-table" style="margin:0;">
                <thead>
                    <tr>
                        <th>User</th>
                        <th>Letter Reference</th>
                        <th>Reference Account Name</th>
                        <th>Status</th>
                        <th>Last Updated</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    ${list.map(sub => {
                        const fd         = sub.form_data || {};
                        const letterRef  = fd.letter_ref || '--';
                        const refAccount = fd.reference_account_name || '--';
                        const email      = sub._profile?.email || '--';
                        const name       = sub._profile?.full_name || sub._profile?.email || 'Unknown';
                        const date       = new Date(sub.updated_at).toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'numeric'});
                        const sClass     = {draft:'status-draft',submitted:'status-submitted',reviewed:'status-reviewed'}[sub.status] || '';
                        const sLabel     = sub.status.charAt(0).toUpperCase() + sub.status.slice(1);
                        return `<tr>
                            <td>
                                <div class="user-cell">
                                    <div class="user-avatar">${(name||'?')[0].toUpperCase()}</div>
                                    <div>
                                        <div class="user-name">${name}</div>
                                        <div class="user-email">${email}</div>
                                    </div>
                                </div>
                            </td>
                            <td>${letterRef}</td>
                            <td>${refAccount}</td>
                            <td><span class="status-badge ${sClass}">${sLabel}</span></td>
                            <td>${date}</td>
                            <td>
                                <div class="action-buttons">
                                    <a href="form.html?id=${sub.id}&admin=true" class="btn btn-sm btn-outline">Edit</a>
                                    <button class="btn btn-sm btn-primary" onclick="Admin.downloadReport('${sub.id}')">PDF</button>
                                    ${sub.status !== 'reviewed' ? `<button class="btn btn-sm btn-success" onclick="Admin.markReviewed('${sub.id}', this)">Reviewed</button>` : ''}
                                </div>
                            </td>
                        </tr>`;
                    }).join('')}
                </tbody>
            </table>`;
    },

    async markReviewed(id, btn) {
        btn.disabled = true;
        btn.textContent = '...';
        try {
            const { error } = await db.from('submissions').update({ status: 'reviewed' }).eq('id', id);
            if (error) throw error;
            UI.showToast('Marked as reviewed', 'success');
            await this.loadStats();
            await this.loadAllSubmissions();
        } catch(err) {
            UI.showToast('Error: ' + err.message, 'error');
            btn.disabled = false;
            btn.textContent = 'Reviewed';
        }
    },

    async downloadReport(submissionId) {
        try {
            const sub = this.allData.find(s => s.id === submissionId);
            let formData = sub ? sub.form_data : null;
            if (!formData) {
                const { data } = await db.from('submissions').select('*').eq('id', submissionId).single();
                formData = data?.form_data;
            }
            const type = formData?._formType || sub?.form_type || 'vehicle-valuation';
            if (type === 'property-valuation') {
                await PDFEngine.generate(formData, PropertyValuationPDF);
            } else if (type === 'ebl-land-building') {
                await PDFEngine.generate(formData, EBLLandBuildingPDF);
            } else {
                await PDFEngine.generate(formData, VehicleValuationPDF);
            }
        } catch(err) { UI.showToast('PDF failed: ' + err.message, 'error'); }
    }
};

document.addEventListener('DOMContentLoaded', () => Admin.init());
</script>

</body>
</html>
